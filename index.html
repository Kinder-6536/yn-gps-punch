<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <title>YN 打卡系統</title>
  <style>
    body { margin:0; font-family:Arial,"Microsoft JhengHei",sans-serif; background:#f5f7fb; color:#202124; padding-bottom:108px; }
    .wrap { max-width:430px; margin:0 auto; padding:22px 18px; }
    .title { font-size:28px; font-weight:800; margin-bottom:10px; }
    .tabs { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin:12px 0 16px; }
    .tab { background:#fff; color:#344054; border:1px solid #d0d5dd; border-radius:12px; padding:10px; font-size:16px; font-weight:800; }
    .tab.active { background:#06c755; color:#fff; border-color:#06c755; }
    .date { font-size:17px; }
    .time { font-size:48px; font-weight:800; text-align:center; margin:16px 0 22px; }
    .panel { background:#fff; border-radius:18px; padding:18px; box-shadow:0 8px 24px rgba(0,0,0,.08); min-height:250px; }
    .panel-title { font-size:21px; font-weight:800; margin-bottom:14px; }
    .grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:12px; }
    .main-btn { border:0; border-radius:12px; padding:16px; font-size:20px; font-weight:800; color:white; background:#3273dc; }
    .main-btn.primary { background:#06c755; }
    .status { margin-top:16px; white-space:pre-line; line-height:1.55; font-size:15px; color:#344054; }
    .placeholder { color:#667085; line-height:1.7; font-size:15px; }
    .bottom-nav { position:fixed; left:0; right:0; bottom:0; background:#fff; border-top:1px solid #e5e7eb; box-shadow:0 -6px 20px rgba(0,0,0,.08); padding:8px 8px calc(8px + env(safe-area-inset-bottom)); display:grid; grid-template-columns:repeat(4,1fr); gap:6px; max-width:430px; margin:0 auto; }
    .nav-item { border:0; background:transparent; color:#344054; padding:8px 2px; border-radius:10px; font-size:12px; font-weight:800; min-height:50px; }
    .nav-item.active { background:#e9f8ef; color:#087a3b; }
    button:disabled { background:#aaa; color:#fff; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="title">YN 打卡系統</div>

    <div class="tabs">
      <button class="tab active" id="employeeTab" onclick="switchMode('employee')">員工</button>
      <button class="tab" id="adminTab" onclick="switchMode('admin')">管理員</button>
    </div>

    <div class="date" id="dateText"></div>
    <div class="time" id="timeText">--:--</div>

    <div class="panel">
      <div class="panel-title" id="panelTitle">我要打卡</div>
      <div id="content"></div>
      <div class="status" id="status">正在初始化 LINE 登入...</div>
    </div>
  </div>

  <div class="bottom-nav" id="bottomNav"></div>

  <script>
    const LIFF_ID = '2010401445-uCijQZfw';
    const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw-bmhtzpcUPtetf7KbnPZDnehn-TLbvogza9V_a6WZoye1WoPe_okWAFpwzRf_ruxa/exec';

    let accessToken = '';
    let idToken = '';
    let ready = false;
    let currentMode = 'employee';

    const menus = {
      employee: [
        ['punch', '我要打卡'], ['status', '今日狀態'], ['leave', '請假申請'], ['makeup', '補卡申請'],
        ['outside', '外出申請'], ['report', '出勤紀錄'], ['overtime', '加班統計'], ['more', '更多功能']
      ],
      admin: [
        ['abnormal', '今日異常'], ['daily', '出勤日報'], ['monthly', '月統計'], ['leaveReview', '請假審核'],
        ['makeupReview', '補卡審核'], ['outsideReview', '外出審核'], ['employees', '員工資料'], ['settings', '系統設定']
      ]
    };

    window.onerror = function(message, source, lineno) {
      setStatus('前端錯誤：' + message + '\n行數：' + lineno);
    };

    function updateClock() {
      const now = new Date();
      document.getElementById('dateText').textContent = now.toLocaleDateString('zh-TW', { year:'numeric', month:'2-digit', day:'2-digit', weekday:'long' });
      document.getElementById('timeText').textContent = now.toLocaleTimeString('zh-TW', { hour:'2-digit', minute:'2-digit', hour12:false });
    }

    async function init() {
      try {
        renderMenu();
        renderPunchPage();
        setStatus('版本：0617-line-app\n正在初始化 LINE 登入...');

        await Promise.race([
          liff.init({ liffId: LIFF_ID }),
          new Promise(function(resolve, reject) {
            setTimeout(function() { reject(new Error('LIFF 初始化逾時，請關閉後重新從 LINE 開啟。')); }, 15000);
          })
        ]);

        if (!liff.isLoggedIn()) {
          liff.login({ redirectUri: window.location.href });
          return;
        }

        accessToken = liff.getAccessToken() || '';
        idToken = liff.getIDToken() || '';
        ready = true;

        const autoAction = getActionFromUrl();

        if (autoAction) {
        setStatus('已取得 LINE 資料，正在自動打卡：' + autoAction);
        setTimeout(function() {
        punch(autoAction);
        }, 500);
    return;
}

setStatus('已取得 LINE 資料，請選擇功能。');

      } catch (error) {
        setStatus('LIFF 初始化失敗：' + error.message);
      }
    }

    function getActionFromUrl() {
        const params = new URLSearchParams(window.location.search);
        const action = params.get('action');

        const actionMap = {
        clockin: '上班',
        clockout: '下班',
        out: '外出',
        back: '返回'
    };

  return actionMap[action] || '';
}


    
    function switchMode(mode) {
      currentMode = mode;
      document.getElementById('employeeTab').classList.toggle('active', mode === 'employee');
      document.getElementById('adminTab').classList.toggle('active', mode === 'admin');
      renderMenu();
      showPage(menus[mode][0][0]);
    }

    function renderMenu() {
      const nav = document.getElementById('bottomNav');
      nav.innerHTML = menus[currentMode].map(function(item, index) {
        return '<button class="nav-item ' + (index === 0 ? 'active' : '') + '" data-page="' + item[0] + '">' + item[1] + '</button>';
      }).join('');

      document.querySelectorAll('.nav-item').forEach(function(button) {
        button.addEventListener('click', function() {
          document.querySelectorAll('.nav-item').forEach(function(item) { item.classList.remove('active'); });
          button.classList.add('active');
          showPage(button.dataset.page);
        });
      });
    }

    function showPage(page) {
      if (page === 'punch') return renderPunchPage();

      const titles = {
        status:'今日狀態', leave:'請假申請', makeup:'補卡申請', outside:'外出申請',
        report:'出勤紀錄', overtime:'加班統計', more:'更多功能',
        abnormal:'今日異常', daily:'出勤日報', monthly:'月統計', leaveReview:'請假審核',
        makeupReview:'補卡審核', outsideReview:'外出審核', employees:'員工資料', settings:'系統設定'
      };

      renderPlaceholder(titles[page] || '功能', '這個功能頁已建立，下一步可以接 Google Sheet 資料與送出表單。');
    }

    function renderPunchPage() {
      document.getElementById('panelTitle').textContent = '我要打卡';
      document.getElementById('content').innerHTML =
        '<div>請選擇打卡動作</div><div class="grid">' +
        '<button class="main-btn primary punch-btn" data-action="上班">上班</button>' +
        '<button class="main-btn punch-btn" data-action="下班">下班</button>' +
        '<button class="main-btn punch-btn" data-action="外出">外出</button>' +
        '<button class="main-btn punch-btn" data-action="返回">返回</button>' +
        '</div>';
      bindPunchButtons();
    }

    function renderPlaceholder(title, text) {
      document.getElementById('panelTitle').textContent = title;
      document.getElementById('content').innerHTML = '<div class="placeholder">' + text + '</div>';
      setStatus('');
    }

    function bindPunchButtons() {
      document.querySelectorAll('.punch-btn').forEach(function(button) {
        button.addEventListener('click', function() {
          punch(button.dataset.action);
        });
      });
    }

    function punch(punchAction) {
      if (!ready) return setStatus('LINE 尚未初始化完成，請稍候。');
      setButtonsDisabled(true);
      setStatus('正在取得 GPS 位置...');

      navigator.geolocation.getCurrentPosition(
        function(position) { submitPunch(punchAction, position.coords); },
        function(error) {
          setButtonsDisabled(false);
          setStatus('定位失敗：請確認 LINE 已允許定位權限。\n' + error.message);
        },
        { enableHighAccuracy:true, timeout:20000, maximumAge:0 }
      );
    }

    function submitPunch(punchAction, coords) {
      const callbackName = 'jsonpCallback_' + Date.now();

      window[callbackName] = function(result) {
        setStatus(result.message);
        setButtonsDisabled(false);
        delete window[callbackName];
      };

      const params = new URLSearchParams({
        api:'submitPunch',
        callback:callbackName,
        action:punchAction,
        accessToken:accessToken,
        idToken:idToken,
        latitude:coords.latitude,
        longitude:coords.longitude,
        accuracy:coords.accuracy
      });

      const script = document.createElement('script');
      script.src = APPS_SCRIPT_URL + '?' + params.toString();
      script.onerror = function() {
        setStatus('送出失敗：無法連線到 Apps Script。');
        setButtonsDisabled(false);
      };
      document.body.appendChild(script);
    }

    function setButtonsDisabled(disabled) {
      document.querySelectorAll('.punch-btn').forEach(function(button) { button.disabled = disabled; });
    }

    function setStatus(text) {
      document.getElementById('status').textContent = text;
    }

    updateClock();
    setInterval(updateClock, 1000);
    init();
  </script>
</body>
</html>
