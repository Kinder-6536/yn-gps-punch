<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <title>YN 打卡系統</title>
  <style>
    body { margin:0; font-family:Arial,"Microsoft JhengHei",sans-serif; background:#f5f7fb; color:#202124; padding-bottom:108px; }
    .wrap { max-width:430px; margin:0 auto; padding:22px 18px; }
    .title { font-size:28px; font-weight:800; margin-bottom:10px; }
    .tabs { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin:12px 0 16px; }
    .tab { background:#fff; color:#344054; border:1px solid #d0d5dd; border-radius:12px; padding:10px; font-size:16px; font-weight:800; }
    .tab.active { background:#06c755; color:#fff; border-color:#06c755; }
    .date { font-size:17px; }
    .time { font-size:48px; font-weight:800; text-align:center; margin:16px 0 22px; }
    .panel { background:#fff; border-radius:18px; padding:18px; box-shadow:0 8px 24px rgba(0,0,0,.08); min-height:250px; }
    .panel-title { font-size:21px; font-weight:800; margin-bottom:14px; }
    .grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:12px; }
    .main-btn { border:0; border-radius:12px; padding:16px; font-size:20px; font-weight:800; color:white; background:#3273dc; }
    .main-btn.primary { background:#06c755; }
    .status { margin-top:16px; white-space:pre-line; line-height:1.55; font-size:15px; color:#344054; }
    .placeholder { color:#667085; line-height:1.7; font-size:15px; }
    .bottom-nav { position:fixed; left:0; right:0; bottom:0; background:#fff; border-top:1px solid #e5e7eb; box-shadow:0 -6px 20px rgba(0,0,0,.08); padding:8px 8px calc(8px + env(safe-area-inset-bottom)); display:grid; grid-template-columns:repeat(4,1fr); gap:6px; max-width:430px; margin:0 auto; }
    .nav-item { border:0; background:transparent; color:#344054; padding:8px 2px; border-radius:10px; font-size:12px; font-weight:800; min-height:50px; }
    .nav-item.active { background:#e9f8ef; color:#087a3b; }
    button:disabled { background:#aaa; color:#fff; }
     .form { display:grid; gap:8px; }
    .form label { font-size:14px; font-weight:800; color:#344054; margin-top:4px; }
    .input { width:100%; box-sizing:border-box; border:1px solid #d0d5dd; border-radius:10px; padding:11px; font-size:16px; background:#fff; }
    .textarea { min-height:80px; resize:vertical; }
    .full-btn { width:100%; margin-top:10px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="title">YN 打卡系統</div>

    <div class="tabs">
      <button class="tab active" id="employeeTab" onclick="switchMode('employee')">員工</button>
      <button class="tab" id="adminTab" onclick="switchMode('admin')">管理員</button>
    </div>

    <div class="date" id="dateText"></div>
    <div class="time" id="timeText">--:--</div>

    <div class="panel">
      <div class="panel-title" id="panelTitle">我要打卡</div>
      <div id="content"></div>
      <div class="status" id="status">正在初始化 LINE 登入...</div>
    </div>
  </div>

  <div class="bottom-nav" id="bottomNav"></div>

  <script>
    const LIFF_ID = '2010401445-uCijQZfw';
    const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw-bmhtzpcUPtetf7KbnPZDnehn-TLbvogza9V_a6WZoye1WoPe_okWAFpwzRf_ruxa/exec';

    let accessToken = '';
    let idToken = '';
    let ready = false;
    let currentMode = 'employee';

    const menus = {
  employee: [
    ['punch', '我要打卡'],
    ['todayStatus', '今日狀態'],
    ['leave', '請假申請'],
    ['makeup', '補卡申請'],
    ['myAbnormal', '異常出勤'],
    ['records', '出勤紀錄'],
    ['overtime', '加班統計'],
    ['more', '更多功能']
  ],
  admin: [
    ['recentAbnormal', '近期異常'],
    ['realtime', '即時出勤'],
    ['abnormalSearch', '異常查詢'],
    ['leaveReview', '請假審核'],
    ['makeupReview', '補卡審核'],
    ['reportGenerate', '報表產生'],
    ['employees', '員工資料'],
    ['settings', '系統設定']
  ]
};

    window.onerror = function(message, source, lineno) {
      setStatus('前端錯誤：' + message + '\n行數：' + lineno);
    };
    window.onunhandledrejection = function(event) {
      setStatus('前端錯誤：' + (event.reason && event.reason.message ? event.reason.message : event.reason));
    };
    
    function updateClock() {
      const now = new Date();
      document.getElementById('dateText').textContent = now.toLocaleDateString('zh-TW', { year:'numeric', month:'2-digit', day:'2-digit', weekday:'long' });
      document.getElementById('timeText').textContent = now.toLocaleTimeString('zh-TW', { hour:'2-digit', minute:'2-digit', hour12:false });
    }

    async function init() {
      try {
        renderMenu();
        renderPunchPage();
        setStatus('版本：0617-leave-auto-hours\n正在初始化 LINE 登入...');

setStatus('版本：0617-leave-auto-hours\n準備初始化 LIFF...');

await liff.init({ liffId: LIFF_ID });

setStatus('LIFF 初始化完成，正在確認登入...');

        if (!liff.isLoggedIn()) {
          liff.login({ redirectUri: window.location.href });
          return;
        }

        accessToken = liff.getAccessToken() || '';
        idToken = liff.getIDToken() || '';
        ready = true;

const autoAction = getActionFromUrl();

if (autoAction) {
  setStatus('已取得 LINE 資料，正在自動打卡：' + autoAction);
  setTimeout(function() {
    punch(autoAction);
  }, 500);
  return;
}

setStatus('已取得 LINE 資料，請選擇功能。');

      } catch (error) {
        setStatus('LIFF 初始化失敗：' + error.message);
      }
    }

    function getActionFromUrl() {
        const params = new URLSearchParams(window.location.search);
        const action = params.get('action');

        const actionMap = {
        clockin: '上班',
        clockout: '下班',
        out: '外出',
        back: '返回'
    };

  return actionMap[action] || '';
}


    
    function switchMode(mode) {
      currentMode = mode;
      document.getElementById('employeeTab').classList.toggle('active', mode === 'employee');
      document.getElementById('adminTab').classList.toggle('active', mode === 'admin');
      renderMenu();
      showPage(menus[mode][0][0]);
    }

    function renderMenu() {
      const nav = document.getElementById('bottomNav');
      nav.innerHTML = menus[currentMode].map(function(item, index) {
        return '<button class="nav-item ' + (index === 0 ? 'active' : '') + '" data-page="' + item[0] + '">' + item[1] + '</button>';
      }).join('');

      document.querySelectorAll('.nav-item').forEach(function(button) {
        button.addEventListener('click', function() {
          document.querySelectorAll('.nav-item').forEach(function(item) { item.classList.remove('active'); });
          button.classList.add('active');
          showPage(button.dataset.page);
        });
      });
    }

    function showPage(page) {
  if (page === 'punch') return renderPunchPage();
  if (page === 'leave') return renderLeavePage();
  if (page === 'makeup') return renderMakeupPage();

  const titles = {
    todayStatus: '今日狀態',
    myAbnormal: '異常出勤',
    records: '出勤紀錄',
    overtime: '加班統計',
    more: '更多功能',

    recentAbnormal: '近期異常',
    realtime: '即時出勤',
    abnormalSearch: '異常查詢',
    leaveReview: '請假審核',
    makeupReview: '補卡審核',
    reportGenerate: '報表產生',
    employees: '員工資料',
    settings: '系統設定'
  };

  const descriptions = {
    todayStatus: '這裡之後會顯示今天上班、下班、外出、返回的打卡時間。',
    myAbnormal: '這裡之後會顯示你的本月異常出勤紀錄。',
    records: '這裡之後會顯示最近 10 筆打卡紀錄。',
    overtime: '這裡之後會顯示本月加班分鐘與加班時數。',
    more: '更多功能可以先保留，之後放薪資查詢、假別餘額或公告。',

    recentAbnormal: '這裡之後會顯示最近 3 天的異常出勤。',
    realtime: '這裡之後會顯示今天誰已上班、誰尚未上班、誰尚未下班。',
    abnormalSearch: '這裡之後可以選日期區間查詢異常出勤報表。',
    leaveReview: '這裡之後會顯示待審核請假申請。',
    makeupReview: '這裡之後會顯示待審核補卡申請。',
    reportGenerate: '這裡之後可以選月份或日期區間產生出勤報表。',
    employees: '這裡之後會顯示員工名單與在職狀態。',
    settings: '這裡之後可以管理管理員、打卡地點、行事曆設定。'
  };

  renderPlaceholder(titles[page] || '功能', descriptions[page] || '這個功能頁已建立。');
}

    function renderPunchPage() {
      document.getElementById('panelTitle').textContent = '我要打卡';
      document.getElementById('content').innerHTML =
        '<div>請選擇打卡動作</div><div class="grid">' +
        '<button class="main-btn primary punch-btn" data-action="上班">上班</button>' +
        '<button class="main-btn punch-btn" data-action="下班">下班</button>' +
        '<button class="main-btn punch-btn" data-action="外出">外出</button>' +
        '<button class="main-btn punch-btn" data-action="返回">返回</button>' +
        '</div>';
      bindPunchButtons();
    }

      function renderLeavePage() {
  document.getElementById('panelTitle').textContent = '請假申請';
  document.getElementById('content').innerHTML =
    '<div class="form">' +
      '<label>假別</label>' +
      '<select id="leaveType" class="input">' +
        '<option value="特休">特休</option>' +
        '<option value="病假">病假</option>' +
        '<option value="事假">事假</option>' +
        '<option value="公假">公假</option>' +
        '<option value="喪假">喪假</option>' +
        '<option value="婚假">婚假</option>' +
        '<option value="產假">產假</option>' +
      '</select>' +

      '<label>開始日期</label>' +
      '<input id="leaveStartDate" class="input" type="date">' +

      '<label>開始時間</label>' +
      '<input id="leaveStartTime" class="input" type="time">' +

      '<label>結束日期</label>' +
      '<input id="leaveEndDate" class="input" type="date">' +

      '<label>結束時間</label>' +
      '<input id="leaveEndTime" class="input" type="time">' +

      '<div class="placeholder">請假時數會由系統依日期與上班日自動計算。</div>'+

      '<label>事由</label>' +
      '<textarea id="leaveReason" class="input textarea" placeholder="請輸入請假事由"></textarea>' +

      '<button class="main-btn primary full-btn" onclick="submitLeave()">送出請假申請</button>' +
    '</div>';

  setStatus('請填寫請假資料。');
}

function renderMakeupPage() {
  document.getElementById('panelTitle').textContent = '補卡申請';
  document.getElementById('content').innerHTML =
    '<div class="placeholder">' +
    '補卡申請表單會放在這裡。<br>' +
    '之後需要新增「補卡申請」工作表，審核通過後才補進打卡紀錄。' +
    '</div>';
  setStatus('下一步會建立補卡申請流程。');
}


    
    function renderPlaceholder(title, text) {
      document.getElementById('panelTitle').textContent = title;
      document.getElementById('content').innerHTML = '<div class="placeholder">' + text + '</div>';
      setStatus('');
    }

    function bindPunchButtons() {
      document.querySelectorAll('.punch-btn').forEach(function(button) {
        button.addEventListener('click', function() {
          punch(button.dataset.action);
        });
      });
    }

    function punch(punchAction) {
      if (!ready) return setStatus('LINE 尚未初始化完成，請稍候。');
      setButtonsDisabled(true);
      setStatus('正在取得 GPS 位置...');

      navigator.geolocation.getCurrentPosition(
        function(position) { submitPunch(punchAction, position.coords); },
        function(error) {
          setButtonsDisabled(false);
          setStatus('定位失敗：請確認 LINE 已允許定位權限。\n' + error.message);
        },
        { enableHighAccuracy:true, timeout:20000, maximumAge:0 }
      );
    }

    function submitPunch(punchAction, coords) {
      const callbackName = 'jsonpCallback_' + Date.now();

      window[callbackName] = function(result) {
        setStatus(result.message);
        setButtonsDisabled(false);
        delete window[callbackName];
      };

      const params = new URLSearchParams({
        api:'submitPunch',
        callback:callbackName,
        action:punchAction,
        accessToken:accessToken,
        idToken:idToken,
        latitude:coords.latitude,
        longitude:coords.longitude,
        accuracy:coords.accuracy
      });

      const script = document.createElement('script');
      script.src = APPS_SCRIPT_URL + '?' + params.toString();
      script.onerror = function() {
        setStatus('送出失敗：無法連線到 Apps Script。');
        setButtonsDisabled(false);
      };
      document.body.appendChild(script);
    }

    function submitLeave() {
  if (!ready) {
    setStatus('LINE 尚未初始化完成，請稍候。');
    return;
  }

  const leaveType = document.getElementById('leaveType').value;
  const startDate = document.getElementById('leaveStartDate').value;
  const startTime = document.getElementById('leaveStartTime').value;
  const endDate = document.getElementById('leaveEndDate').value;
  const endTime = document.getElementById('leaveEndTime').value;
  const reason = document.getElementById('leaveReason').value.trim();

  if (!startDate || !startTime || !endDate || !endTime || !reason) {
    setStatus('請完整填寫請假資料。');
    return;
  }

  const callbackName = 'jsonpCallback_' + Date.now();

  window[callbackName] = function(result) {
    setStatus(result.message);
    delete window[callbackName];
  };

  const params = new URLSearchParams({
    api: 'submitLeave',
    callback: callbackName,
    accessToken: accessToken,
    idToken: idToken,
    leaveType: leaveType,
    startDate: startDate,
    startTime: startTime,
    endDate: endDate,
    endTime: endTime,
    reason: reason
  });

  const script = document.createElement('script');
  script.src = APPS_SCRIPT_URL + '?' + params.toString();
  script.onerror = function() {
    setStatus('送出失敗：無法連線到 Apps Script。');
  };
  document.body.appendChild(script);

  setStatus('正在送出請假申請...');
}

    
    function setButtonsDisabled(disabled) {
      document.querySelectorAll('.punch-btn').forEach(function(button) { button.disabled = disabled; });
    }

    function setStatus(text) {
      document.getElementById('status').textContent = text;
    }

    updateClock();
    setInterval(updateClock, 1000);
    init();
  </script>
</body>
</html>
